<!DOCTYPE html>

<head>

<title>Tablatura no disponible — Trèfle.Minotaure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --gold: #b8962e;
    --gold-light: #d4b87a;
    --dark: #0e0a04;
    --parchment: #f5ecd7;
    --muted: #8a7a55;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--parchment);
    font-family: "Cormorant Garamond", serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap {
    max-width: 560px;
    text-align: center;
    background: linear-gradient(135deg, #1a1208 0%, #150e06 100%);
    border: 1px solid #2a1e0a;
    border-radius: 10px;
    padding: 48px 32px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .icon { width: 72px; height: 72px; margin: 0 auto 20px; opacity: 0.85; }
  .icon svg { width: 100%; height: 100%; }
  h1 {
    font-family: "IM Fell English", serif;
    font-size: 1.7rem;
    color: #e8d5a0;
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }
  .sub {
    font-family: "Cinzel", serif;
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
  }
  p { line-height: 1.7; color: #cdbb96; font-size: 1.05rem; margin-bottom: 10px; }
  .note { margin-top: 24px; font-style: italic; font-size: 0.95rem; color: var(--muted); }
  .langs {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .langs a {
    font-family: "Cinzel", serif;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid #2a1e0a;
    border-radius: 14px;
    padding: 3px 10px;
  }
  .langs a.on, .langs a:hover { color: #fff; background: var(--gold); border-color: var(--gold); }
  .back {
    display: inline-block;
    margin-top: 24px;
    font-family: "Cinzel", serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold-light);
    text-decoration: none;
    border: 1px solid #3a2a10;
    border-radius: 20px;
    padding: 8px 20px;
    transition: all 0.18s;
  }
  .back:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
</style>

  <div class="wrap">

        <circle cx="50" cy="70" r="2.6" fill="#d4b87a"/>
